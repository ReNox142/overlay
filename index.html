<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { margin: 0; background: transparent; font-family: sans-serif; }
    .box {
      position: fixed; top: 20px; left: 20px;
      background: rgba(0,0,0,.55); color: white;
      padding: 12px 16px; border-radius: 12px;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="box" id="bonding">Bonding: warte auf Daten …</div>
  <script>
    const el = document.getElementById("bonding");

    if (window.moblin) {
      moblin.subscribe({}); // später gezielt Topic(s) setzen
      moblin.onmessage = (message) => {
        console.log(message);

        // Hier musst du prüfen, wie die Daten bei dir konkret ankommen.
        // Beispielhaft:
        if (message.bonding) {
          el.textContent =
            `Wi-Fi: ${message.bonding.wifi_kbps} kbps | ` +
            `Cellular: ${message.bonding.cellular_kbps} kbps`;
        }
      };
    } else {
      el.textContent = "Moblin API nicht verfügbar";
    }
  </script>
</body>
</html>
